# ==========================================================================
# Perfil DOCKER - backend ejecutado dentro de docker-compose.
# El host de la BD es el nombre del servicio 'mysql' de la red de compose.
# ==========================================================================
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:educktrack}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota&characterEncoding=UTF-8
    username: ${DB_USER:educktrack}
    password: ${DB_PASSWORD:educktrack}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: false

logging:
  level:
    com.educktrack: INFO
