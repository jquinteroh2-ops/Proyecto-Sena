# Nginx como proxy inverso delante del frontend (RS-01, RS-10).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta desconocida cae en index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy de la API hacia el backend dentro de la red de docker-compose
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Documentacion de la API accesible via el proxy (RS-09)
    location /swagger-ui/ { proxy_pass http://backend:8080/swagger-ui/; }
    location /v3/api-docs { proxy_pass http://backend:8080/v3/api-docs; }
}
